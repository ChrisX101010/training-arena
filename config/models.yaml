arena:
  judge_model: phi3:mini
  prompts_file: prompts/default.json
  max_prompts_per_match: 7

models:
  # HuggingFace models (distillation targets)
  - name: gpt2
    provider: huggingface
    role: contestant
  - name: distilgpt2
    provider: huggingface
    role: contestant
  - name: Qwen/Qwen2.5-0.5B
    provider: huggingface
    role: contestant

  # Qwen 3.5 via Ollama (strong contestant — uncomment when installed)
  # Install: ollama pull qwen3.5:4b
  # - name: qwen3.5:4b
  #   provider: ollama
  #   role: contestant
  #   description: "Qwen 3.5 4B — best perf/VRAM ratio for RTX 3050"

  # Ollama models
  - name: phi3:mini
    provider: ollama
    role: judge
    enabled: false
  - name: llama3.2:1b
    provider: ollama
    role: contestant
    enabled: false

training:
  student_model: distilgpt2
  output_dir: ./results/distilled
  num_epochs: 3
  learning_rate: 2e-4
  batch_size: 2
  max_length: 512
  # PEFT/LoRA config
  use_peft: true
  use_qlora: true
  lora_r: 16
  lora_alpha: 32
  exclude_from_training:
    - phi3:mini
    - llama3.2:1b
  trainable_only: true

wiki:
  path: ./llm_wiki
  auto_pull: true
  remote_url: ""
  axiom_wiki_path: ""

# LARQL weight-level verification (optional)
# Install: cargo install larql
larql:
  vindex_dir: ./vindexes
  auto_verify: true
  verify_concepts_per_domain:
    knowledge: ["France", "Shakespeare", "colors"]
    math: ["addition", "algebra", "equation"]
    science: ["gravity", "photosynthesis", "water"]

dashboard:
  host: 0.0.0.0
  port: 8501
